<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tetris by Mario</title>
  <link href="styles.css" rel="stylesheet">
  <script src="tetris.js"></script>
</head>

<body>
  <main>
    <h1>Bienvenido a Tetris by Mario!</h1>
    <p>Este es un experimento de Mario en el que, desde tu computadora puedes jugar una partida de Tetris, y guardarla
      al marcador global :)</p>
    <button id="start-game" onclick="startGame(); blur()">Iniciar juego</button>

    <div id="board"></div>

    <div id="game-over"></div>

    <div>
      <h3 id="score">Score: </h3>
      <h4 id="level">Level: </h4>
    </div>

    <div>
      <h2 id="last-clear">Prueba</h2>
    </div>

    <h3>Hold piece: (Presiona "C" para holdear)</h3>
    <div id="hold-piece"></div>
  </main>

</body>

</html>
